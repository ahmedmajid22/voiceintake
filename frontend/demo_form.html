<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Intake Form — CityMed Clinic</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; }
        .header { background: linear-gradient(135deg, #1565c0, #0d47a1); color: white; padding: 24px 40px; }
        .header h1 { font-size: 24px; font-weight: 700; }
        .header p { font-size: 13px; opacity: 0.8; margin-top: 3px; }
        .container { max-width: 720px; margin: 30px auto; padding: 0 20px 60px; }
        .status-bar { background: white; border: 2px solid #e0e0e0; border-radius: 10px; padding: 14px 20px; text-align: center; font-size: 14px; font-weight: 600; color: #666; margin-bottom: 24px; transition: all 0.4s ease; }
        .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
        .card-title { font-size: 13px; font-weight: 700; color: #1565c0; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 2px solid #e8f0fe; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .field { margin-bottom: 16px; }
        label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.3px; }
        input, textarea { width: 100%; padding: 11px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; color: #333; background: #fafafa; transition: all 0.3s ease; font-family: inherit; }
        input:focus, textarea:focus { outline: none; border-color: #1565c0; background: white; }
        textarea { resize: vertical; min-height: 90px; }
        .ai-tag { display: inline-flex; align-items: center; gap: 5px; background: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-bottom: 20px; }
        .submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #1565c0, #0d47a1); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(21,101,192,0.35); }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏥 CityMed Clinic</h1>
        <p>Patient Intake Form — Powered by VoiceIntake AI</p>
    </div>
    <div class="container">
        <div class="status-bar" id="status-bar">⏳ Waiting for voice input...</div>
        <div class="card">
            <div class="ai-tag">🤖 AI AUTO-FILL ACTIVE</div>
            <div class="card-title">Personal Information</div>
            <div class="row">
                <div class="field">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" placeholder="Patient full name">
                </div>
                <div class="field">
                    <label for="date_of_birth">Date of Birth</label>
                    <input type="text" id="date_of_birth" placeholder="YYYY-MM-DD">
                </div>
            </div>
            <div class="field">
                <label for="address">Home Address</label>
                <input type="text" id="address" placeholder="Full address">
            </div>
        </div>
        <div class="card">
            <div class="card-title">Contact & Insurance</div>
            <div class="row">
                <div class="field">
                    <label for="phone_number">Phone Number</label>
                    <input type="tel" id="phone_number" placeholder="Phone number">
                </div>
                <div class="field">
                    <label for="insurance_number">Insurance Number</label>
                    <input type="text" id="insurance_number" placeholder="Insurance ID">
                </div>
            </div>
            <div class="field">
                <label for="emergency_contact">Emergency Contact</label>
                <input type="text" id="emergency_contact" placeholder="Name and number">
            </div>
        </div>
        <div class="card">
            <div class="card-title">Medical Information</div>
            <div class="field">
                <label for="symptoms">Symptoms / Reason for Visit</label>
                <textarea id="symptoms" placeholder="Describe symptoms..."></textarea>
            </div>
        </div>
        <button class="submit-btn" onclick="handleSubmit()">✓ Confirm & Submit Form</button>
    </div>
    <script>
        function handleSubmit() {
            var bar = document.getElementById('status-bar');
            bar.innerHTML = '✅ Form submitted successfully — Thank you!';
            bar.style.background = '#e8f5e9';
            bar.style.borderColor = '#4caf50';
            bar.style.color = '#2e7d32';
        }
    </script>
</body>
</html>
